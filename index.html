<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>良美眼鏡 - 視力風險評估</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>
    <script type="text/babel">
        // 1. 宣告圖示
        const { Baby, Users, Check, ChevronRight, Activity } = lucide;

        function App() {
            const [step, setStep] = React.useState(1);
            const [role, setRole] = React.useState(null);

            // 簡單測試：點擊按鈕切換步驟
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-10 text-center">
                        <h1 className="text-xl font-bold text-indigo-900 mb-6">良美眼鏡 視力評估</h1>
                        
                        {step === 1 && (
                            <div className="space-y-4">
                                <button onClick={() => {setRole('child'); setStep(2);}} className="w-full p-6 bg-slate-50 rounded-3xl border-2 hover:border-indigo-500 transition-all font-bold">兒童 / 青少年評估</button>
                                <button onClick={() => {setRole('adult'); setStep(2);}} className="w-full p-6 bg-slate-50 rounded-3xl border-2 hover:border-indigo-500 transition-all font-bold">成人視覺優化</button>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="animate-in">
                                <p className="mb-6 text-slate-500">您選擇的是：{role === 'child' ? '兒童' : '成人'}</p>
                                <div className="bg-emerald-50 text-emerald-700 p-4 rounded-2xl mb-6 font-bold">系統連線成功！</div>
                                <button onClick={() => setStep(1)} className="text-indigo-600 underline">返回重新選擇</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        // 延遲一下讓 React 渲染完再抓圖示
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
