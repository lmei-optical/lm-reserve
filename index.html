<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>良美眼鏡 - 專業視力風險評估系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: #312e81; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { 
            Monitor, Sun, BookOpen, Car, Smartphone, Eye, ArrowRight, 
            CheckCircle2, AlertCircle, BarChart3, Users, Baby, ShoppingBag, 
            History, ShieldCheck, Check, Droplets, Clock, EyeOff, BellOff, 
            ShieldAlert, ThumbsUp, Search, Sparkles, Zap, Activity, Heart 
        } = lucide;

        // --- 🚩 關鍵設定：請貼上您測試成功的 GAS 網址 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxKqcY5sPsKEV16-MIC2lM3HzV_3Db-tHqiAaN5AKq8V8M2CWVMlfyNhoIbh1m4DLQt/exec";

        const LegoIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="8" width="18" height="12" rx="2" />
                <circle cx="7" cy="5" r="2" />
                <circle cx="17" cy="5" r="2" />
            </svg>
        );

        const HABIT_OPTIONS = [
            { id: 'study', label: '安親作業、3C產品（每天 > 3 小時）', icon: <BookOpen className="w-5 h-5" /> },
            { id: 'hobbies', label: '高專注近距離活動（ex:畫畫、樂高等）', icon: <LegoIcon /> },
            { id: 'posture', label: '用眼姿勢不良（ex:歪頭、趴著）', icon: <AlertCircle className="w-5 h-5" /> },
            { id: 'outdoor_low', label: '戶外活動不足（未達11小時 / 週）', icon: <Sun className="w-5 h-5" /> },
            { id: 'no_break', label: '連續用眼超過 30～40 分鐘不休息', icon: <History className="w-5 h-5" /> }
        ];

        const ATROPINE_STATUS_OPTIONS = [
            { id: 'none', label: '無明顯不適', icon: <ThumbsUp className="w-4 h-4" /> },
            { id: 'photophobia', label: '畏光', icon: <Sun className="w-4 h-4" /> },
            { id: 'blurry', label: '看近模糊', icon: <EyeOff className="w-4 h-4" /> },
            { id: 'rubbing', label: '容易揉眼／不舒服', icon: <AlertCircle className="w-4 h-4" /> },
            { id: 'forget', label: '有時會忘記點', icon: <BellOff className="w-4 h-4" /> },
            { id: 'concern', label: '家長擔心副作用', icon: <ShieldAlert className="w-4 h-4" /> }
        ];

        const VISION_CHANGE_OPTIONS = [
            { id: 'fast', label: '每學期度數明顯增加', sub: '常喊不清楚，需要換眼鏡', icon: <History className="w-5 h-5" /> },
            { id: 'prevention', label: '剛發現近視 / 尚未近視', sub: '想了解如何預防', icon: <Sparkles className="w-5 h-5" /> },
            { id: 'not_ideal', label: '使用控制產品效果不理想', sub: '尋求進階方案', icon: <AlertCircle className="w-5 h-5" /> },
            { id: 'unsure', label: '不確定目前變化狀況', sub: '需要進一步檢查', icon: <Search className="w-5 h-5" /> }
        ];

        const INTEREST_ROW_1 = [
            { id: 'defocus', label: '近視控制離焦鏡片', icon: <ShieldCheck className="w-4 h-4" /> },
            { id: 'lifestyle', label: '生活調整建議', icon: <Sun className="w-4 h-4" /> }
        ];

        const INTEREST_ROW_2 = [
            { id: 'atropine', label: '散瞳劑', icon: <Droplets className="w-4 h-4" /> },
            { id: 'ok_lens', label: '塑型片', icon: <Eye className="w-4 h-4" /> },
            { id: 'none', label: '無需求', icon: <ThumbsUp className="w-4 h-4" /> }
        ];

        function App() {
            const [userRole, setUserRole] = React.useState(null); 
            const [step, setStep] = React.useState(1);
            const [isUsingAtropine, setIsUsingAtropine] = React.useState(true);
            const [atropineFreq, setAtropineFreq] = React.useState(7);
            const [atropineDuration, setAtropineDuration] = React.useState('');
            const [atropineStatus, setAtropineStatus] = React.useState([]);
            const [selectedHabits, setSelectedHabits] = React.useState([]);
            const [visionStatus, setVisionStatus] = React.useState('');
            const [selectedInterests, setSelectedInterests] = React.useState([]);
            const [result, setResult] = React.useState(null);
            const [isSubmitting, setIsSubmitting] = React.useState(false);

            React.useEffect(() => { setTimeout(() => lucide.createIcons(), 200); }, [step, result]);

            const handleCalculateAnalysis = () => {
                const scoreA = selectedHabits.length;
                let scoreB = 0;
                if (!isUsingAtropine) scoreB += 2;
                else {
                    if (atropineFreq < 5) scoreB += 1;
                    if (atropineStatus.some(s => ['photophobia', 'blurry', 'rubbing'].includes(s))) scoreB += 1;
                    if (atropineStatus.includes('forget')) scoreB += 1;
                }
                let scoreC = 0;
                if (visionStatus === 'fast' || visionStatus === 'not_ideal') scoreC += 2;
                if (visionStatus === 'unsure') scoreC += 1;

                const totalScore = scoreA + scoreB + scoreC;
                const riskLevel = totalScore >= 8 ? 'RED' : (totalScore >= 4 ? 'YELLOW' : 'GREEN');
                let cognitiveType = 'NORMAL';
                if (riskLevel === 'RED' && visionStatus === 'prevention') cognitiveType = 'LOW_AWARENESS';
                if (riskLevel === 'RED' && visionStatus === 'not_ideal') cognitiveType = 'ANXIOUS';
                if (riskLevel === 'GREEN' && (visionStatus === 'fast' || visionStatus === 'not_ideal')) cognitiveType = 'OVERLY_ANXIOUS';

                const highestRisk = Math.max(scoreA, scoreB, scoreC);
                const reasonText = highestRisk === scoreA ? "不良用眼習慣" : (highestRisk === scoreB ? "控制穩定度不足" : "視覺進展速度");

                setResult({ riskLevel, totalScore, cognitiveType, reasonText });
                setStep(100);
            };

            const saveResult = async () => {
                if (isSubmitting) return;
                setIsSubmitting(true);
                const payload = {
                    userRole,
                    riskLevel: result.riskLevel,
                    score: result.totalScore,
                    reason: result.reasonText,
                    habits: selectedHabits.join(", "),
                    interests: selectedInterests.join(", ")
                };
                try {
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setStep(101);
                } catch(e) { alert("儲存失敗，請檢查網路"); }
                finally { setIsSubmitting(false); }
            };

            const toggleInterest = (id) => {
                if (id === 'none') return setSelectedInterests(['none']);
                setSelectedInterests(prev => {
                    const filtered = prev.filter(i => i !== 'none');
                    return filtered.includes(id) ? filtered.filter(i => i !== id) : [...filtered, id];
                });
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white min-h-[600px] flex flex-col animate-in">
                        <div className="px-8 pt-10 pb-4 text-center">
                            <h1 className="text-xs font-bold tracking-[0.3em] text-indigo-900 uppercase opacity-80 mb-2">Vision Expert AI</h1>
                            <div className="h-1 w-10 bg-amber-500 mx-auto rounded-full"></div>
                        </div>

                        <div className="px-8 pb-8 flex-1">
                            {step === 1 && (
                                <div className="text-center">
                                    <h2 className="text-2xl font-bold text-indigo-950 mb-8 mt-4">請選擇評估對象</h2>
                                    <div className="grid gap-4">
                                        <button onClick={() => {setUserRole('child'); setStep(2);}} className="flex items-center gap-6 p-6 rounded-3xl border-2 border-slate-50 bg-slate-50/50 hover:border-indigo-200 transition-all">
                                            <div className="w-16 h-16 bg-amber-50 rounded-2xl flex items-center justify-center"><Baby className="w-8 h-8 text-amber-600" /></div>
                                            <div className="text-left font-bold text-indigo-950 text-lg">兒童 / 青少年</div>
                                        </button>
                                        <button onClick={() => {setUserRole('adult'); setStep(2);}} className="flex items-center gap-6 p-6 rounded-3xl border-2 border-slate-50 bg-slate-50/50 hover:border-indigo-200 transition-all">
                                            <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center"><Users className="w-8 h-8 text-indigo-700" /></div>
                                            <div className="text-left font-bold text-indigo-950 text-lg">成人視覺</div>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="animate-in">
                                    <div className="flex items-center gap-2 mb-4 font-bold text-indigo-950 tracking-tight"><span className="w-1 h-5 bg-amber-500 rounded-full"></span> 散瞳劑使用情形</div>
                                    <div onClick={() => setIsUsingAtropine(!isUsingAtropine)} className="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer mb-6">
                                        <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all ${isUsingAtropine ? 'bg-indigo-900 border-indigo-900' : 'bg-white border-slate-200'}`}>{isUsingAtropine && <Check className="w-3 h-3 text-white" />}</div>
                                        <span className={`text-sm font-bold ${isUsingAtropine ? 'text-indigo-950' : 'text-slate-400'}`}>正在使用 散瞳劑 (Atropine)</span>
                                    </div>
                                    {isUsingAtropine ? (
                                        <div className="space-y-6">
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-end">
                                                    <div className="flex items-center gap-2 text-indigo-900 font-bold text-xs tracking-wider"><Droplets className="w-4 h-4" /> 使用頻率</div>
                                                    <div className="text-right font-black text-indigo-900">{atropineFreq} <span className="text-[10px] text-slate-400 ml-1">次/週</span></div>
                                                </div>
                                                <input type="range" min="1" max="7" step="1" value={atropineFreq} onChange={(e) => setAtropineFreq(parseInt(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                            <div className="space-y-3">
                                                <div className="flex items-center gap-2 text-indigo-900 font-bold text-xs tracking-wider"><Clock className="w-4 h-4" /> 已使用時長</div>
                                                <div className="grid grid-cols-3 gap-2">
                                                    {['1 年內', '1-2 年', '2 年以上'].map((label) => (
                                                        <button key={label} onClick={() => setAtropineDuration(label)} className={`py-3 rounded-2xl border-2 transition-all ${atropineDuration === label ? 'border-indigo-900 bg-indigo-50 shadow-sm text-indigo-950 font-bold' : 'border-slate-50 bg-white text-slate-400 text-xs'}`}>{label}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="space-y-3">
                                                <div className="flex items-center gap-2 text-indigo-900 font-bold text-xs tracking-wider"><ShieldCheck className="w-4 h-4" /> 使用後狀況 (複選)</div>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {ATROPINE_STATUS_OPTIONS.map((opt) => (
                                                        <button key={opt.id} onClick={() => setAtropineStatus(prev => prev.includes(opt.id) ? prev.filter(s => s !== opt.id) : [...prev, opt.id])} className={`flex items-center gap-2 p-3 rounded-xl border-2 transition-all text-left ${atropineStatus.includes(opt.id) ? 'border-indigo-900 bg-indigo-50 shadow-sm text-indigo-950' : 'border-slate-50 bg-white text-slate-500'}`}>
                                                            <div className={atropineStatus.includes(opt.id) ? 'text-indigo-900' : 'text-slate-300'}>{opt.icon}</div>
                                                            <span className="text-[11px] font-bold leading-tight">{opt.label}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ) : <div className="py-10 text-center bg-slate
