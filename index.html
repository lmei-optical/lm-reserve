<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>良美眼鏡 - 專業視覺評估</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: #312e81; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { 
            Monitor, Sun, BookOpen, Car, Smartphone, Eye, ArrowRight, 
            CheckCircle2, AlertCircle, BarChart3, Users, Baby, ShoppingBag, 
            History, ShieldCheck, Check, Droplets, Clock, EyeOff, BellOff, 
            ShieldAlert, ThumbsUp, Search, Sparkles, Zap, Activity, Heart 
        } = lucide;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbxKqcY5sPsKEV16-MIC2lM3HzV_3Db-tHqiAaN5AKq8V8M2CWVMlfyNhoIbh1m4DLQt/exec";

        const LegoIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="8" width="18" height="12" rx="2" />
                <circle cx="7" cy="5" r="2" />
                <circle cx="17" cy="5" r="2" />
            </svg>
        );

        const HABIT_OPTIONS = [
            { id: 'study', label: '安親作業、3C產品（每天 > 3 小時）', icon: <BookOpen className="w-5 h-5" /> },
            { id: 'hobbies', label: '高專注近距離活動（ex:畫畫、樂高等）', icon: <LegoIcon /> },
            { id: 'posture', label: '用眼姿勢不良（ex:歪頭、趴著）', icon: <AlertCircle className="w-5 h-5" /> },
            { id: 'outdoor_low', label: '戶外活動不足（未達11小時 / 週）', icon: <Sun className="w-5 h-5" /> },
            { id: 'no_break', label: '連續用眼超過 30～40 分鐘不休息', icon: <History className="w-5 h-5" /> }
        ];

        const ATROPINE_STATUS_OPTIONS = [
            { id: 'none', label: '無明顯不適', icon: <ThumbsUp className="w-4 h-4" /> },
            { id: 'photophobia', label: '畏光', icon: <Sun className="w-4 h-4" /> },
            { id: 'blurry', label: '看近模糊', icon: <EyeOff className="w-4 h-4" /> },
            { id: 'rubbing', label: '容易揉眼／不舒服', icon: <AlertCircle className="w-4 h-4" /> },
            { id: 'forget', label: '有時會忘記點', icon: <BellOff className="w-4 h-4" /> },
            { id: 'concern', label: '家長擔心副作用', icon: <ShieldAlert className="w-4 h-4" /> }
        ];

        const VISION_CHANGE_OPTIONS = [
            { id: 'fast', label: '每學期度數明顯增加', sub: '常喊不清楚，需要換眼鏡', icon: <History className="w-5 h-5" /> },
            { id: 'prevention', label: '剛發現近視 / 尚未近視', sub: '想了解如何預防', icon: <Sparkles className="w-5 h-5" /> },
            { id: 'not_ideal', label: '使用控制產品效果不理想', sub: '尋求進階方案', icon: <AlertCircle className="w-5 h-5" /> },
            { id: 'unsure', label: '不確定目前變化狀況', sub: '需要專業檢查', icon: <Search className="w-5 h-5" /> }
        ];

        const INTEREST_ROW_1 = [
            { id: 'defocus', label: '近視控制離焦鏡片', icon: <ShieldCheck className="w-4 h-4" /> },
            { id: 'lifestyle', label: '生活調整建議', icon: <Sun className="w-4 h-4" /> }
        ];

        const INTEREST_ROW_2 = [
            { id: 'atropine', label: '散瞳劑', icon: <Droplets className="w-4 h-4" /> },
            { id: 'ok_lens', label: '塑型片', icon: <Eye className="w-4 h-4" /> },
            { id: 'none', label: '無需求', icon: <ThumbsUp className="w-4 h-4" /> }
        ];

        function App() {
            const [userRole, setUserRole] = React.useState(null); 
            const [step, setStep] = React.useState(1);
            const [isUsingAtropine, setIsUsingAtropine] = React.useState(true);
            const [atropineFreq, setAtropineFreq] = React.useState(7);
            const [atropineDuration, setAtropineDuration] = React.useState('');
            const [atropineStatus, setAtropineStatus] = React.useState([]);
            const [selectedHabits, setSelectedHabits] = React.useState([]);
            const [visionStatus, setVisionStatus] = React.useState('');
            const [selectedInterests, setSelectedInterests] = React.useState([]);
            const [result, setResult] = React.useState(null);
            const [isSubmitting, setIsSubmitting] = React.useState(false);

            React.useEffect(() => { 
                lucide.createIcons(); 
            }, [step, result]);

            const handleCalculateAnalysis = () => {
                const scoreA = selectedHabits.length;
                let scoreB = 0;
                if (!isUsingAtropine) scoreB += 2;
                else {
                    if (atropineFreq < 5) scoreB += 1;
                    if (atropineStatus.some(s => ['photophobia', 'blurry', 'rubbing'].includes(s))) scoreB += 1;
                    if (atropineStatus.includes('forget')) scoreB += 1;
                }
                let scoreC = 0;
                if (visionStatus === 'fast' || visionStatus === 'not_ideal') scoreC += 2;
                if (visionStatus === 'unsure') scoreC += 1;

                const totalScore = scoreA + scoreB + scoreC;
                const riskLevel = totalScore >= 8 ? 'RED' : (totalScore >= 4 ? 'YELLOW' : 'GREEN');
                let cognitiveType = 'NORMAL';
                if (riskLevel === 'RED' && visionStatus === 'prevention') cognitiveType = 'LOW_AWARENESS';
                if (riskLevel === 'RED' && visionStatus === 'not_ideal') cognitiveType = 'ANXIOUS';
                if (riskLevel === 'GREEN' && (visionStatus === 'fast' || visionStatus === 'not_ideal')) cognitiveType = 'OVERLY_ANXIOUS';

                const highestRisk = Math.max(scoreA, scoreB, scoreC);
                const reasonText = highestRisk === scoreA ? "不良用眼習慣" : (highestRisk === scoreB ? "控制穩定度不足" : "視覺進展速度");

                setResult({ riskLevel, totalScore, cognitiveType, reasonText });
                setStep(100);
            };

            const saveResult = async () => {
                if (isSubmitting) return;
                setIsSubmitting(true);
                const payload = {
                    userRole,
                    riskLevel: result.riskLevel,
                    score: result.totalScore,
                    reason: result.reasonText,
                    habits: selectedHabits.join(", "),
                    interests: selectedInterests.join(", ")
                };
                try {
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setStep(101);
                } catch(e) { alert("儲存失敗，請檢查網路"); }
                finally { setIsSubmitting(false); }
            };

            const toggleInterest = (id) => {
                if (id === 'none') return setSelectedInterests(['none']);
                setSelectedInterests(prev => {
                    const filtered = prev.filter(i => i !== 'none');
                    return filtered.includes(id) ? filtered.filter(i => i !== id) : [...filtered, id];
                });
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white min-h-[600px] flex flex-col animate-in">
                        <div className="px-8 pt-10 pb-4 text-center">
                            <h1 className="text-xs font-bold tracking-[0.3em] text-indigo-900 uppercase opacity-80 mb-2">Vision Expert AI</h1>
                            <div className="h-1 w-10 bg-amber-500 mx-auto rounded-full"></div>
                        </div>

                        <div className="px-8 pb-8 flex-1">
                            {step === 1 && (
                                <div className="text-center">
                                    <h2 className="text-2xl font-bold text-indigo-950 mb-8 mt-4">請選擇評估對象</h2>
                                    <div className="grid gap-4">
                                        <button onClick={() => {setUserRole('child'); setStep(2);}} className="flex items-center gap-6 p-6 rounded-3xl border-2 border-slate-50 bg-slate-50/50 hover:border-indigo-200 transition-all group">
                                            <div className="w-16 h-16 bg-amber-50 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform"><Baby className="w-8 h-8 text-amber-600" /></div>
                                            <div className="text-left font-bold text-indigo-950 text-lg">兒童 / 青少年</div>
                                        </button>
                                        <button onClick={() => {setUserRole('adult'); setStep(2);}} className="flex items-center gap-6 p-6 rounded-3xl border-2 border-slate-50 bg-slate-50/50 hover:border-indigo-200 transition-all group">
                                            <div className="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center group-hover:scale-110 transition-transform"><Users className="w-8 h-8 text-indigo-700" /></div>
                                            <div className="text-left font-bold text-indigo-950 text-lg">成人視覺</div>
                                        </button>
                                    </div>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="animate-in">
                                    <div className="flex items-center gap-2 mb-4 font-bold text-indigo-950 tracking-tight"><span className="w-1 h-5 bg-amber-500 rounded-full"></span> 散瞳劑使用情形</div>
                                    <div onClick={() => setIsUsingAtropine(!isUsingAtropine)} className="flex items-center gap-3 p-4 bg-slate-50 rounded-2xl border border-slate-100 cursor-pointer mb-6">
                                        <div className={`w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all ${isUsingAtropine ? 'bg-indigo-900 border-indigo-900' : 'bg-white border-slate-200'}`}>{isUsingAtropine && <Check className="w-3 h-3 text-white" />}</div>
                                        <span className={`text-sm font-bold ${isUsingAtropine ? 'text-indigo-950' : 'text-slate-400'}`}>正在使用 散瞳劑 (Atropine)</span>
                                    </div>
                                    {isUsingAtropine ? (
                                        <div className="space-y-6">
                                            <div className="space-y-3">
                                                <div className="flex justify-between items-end">
                                                    <div className="flex items-center gap-2 text-indigo-900 font-bold text-xs tracking-wider"><Droplets className="w-4 h-4" /> 使用頻率</div>
                                                    <div className="text-right font-black text-indigo-900">{atropineFreq} <span className="text-[10px] text-slate-400 ml-1">次/週</span></div>
                                                </div>
                                                <input type="range" min="1" max="7" step="1" value={atropineFreq} onChange={(e) => setAtropineFreq(parseInt(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                            </div>
                                            <div className="space-y-3">
                                                <div className="flex items-center gap-2 text-indigo-900 font-bold text-xs tracking-wider"><Clock className="w-4 h-4" /> 已使用時長</div>
                                                <div className="grid grid-cols-3 gap-2">
                                                    {['1 年內', '1-2 年', '2 年以上'].map((label) => (
                                                        <button key={label} onClick={() => setAtropineDuration(label)} className={`py-3 rounded-2xl border-2 transition-all ${atropineDuration === label ? 'border-indigo-900 bg-indigo-50 shadow-sm text-indigo-950 font-bold' : 'border-slate-50 bg-white text-slate-400 text-xs'}`}>{label}</button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="space-y-3">
                                                <div className="flex items-center gap-2 text-indigo-900 font-bold text-xs tracking-wider"><ShieldCheck className="w-4 h-4" /> 使用後狀況 (複選)</div>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {ATROPINE_STATUS_OPTIONS.map((opt) => (
                                                        <button key={opt.id} onClick={() => setAtropineStatus(prev => prev.includes(opt.id) ? prev.filter(s => s !== opt.id) : [...prev, opt.id])} className={`flex items-center gap-2 p-3 rounded-xl border-2 transition-all text-left ${atropineStatus.includes(opt.id) ? 'border-indigo-900 bg-indigo-50 shadow-sm text-indigo-950' : 'border-slate-50 bg-white text-slate-500'}`}>
                                                            <div className={atropineStatus.includes(opt.id) ? 'text-indigo-900' : 'text-slate-300'}>{opt.icon}</div>
                                                            <span className="text-[11px] font-bold leading-tight">{opt.label}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    ) : <div className="py-10 text-center bg-slate-50 rounded-3xl border border-dashed border-slate-200 text-slate-400 text-sm font-medium">目前暫無散瞳劑使用資訊</div>}
                                    <button disabled={isUsingAtropine && (!atropineDuration || atropineStatus.length === 0)} onClick={() => setStep(3)} className="w-full bg-indigo-900 text-white py-4 rounded-3xl font-bold shadow-xl mt-6 disabled:opacity-30 transition-all">確認並繼續</button>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="animate-in">
                                    <div className="flex items-center gap-2 mb-6 font-bold text-indigo-950"><span className="w-1 h-5 bg-amber-500 rounded-full"></span> 目前的用眼習慣 (可複選)</div>
                                    <div className="space-y-3 mb-8">
                                        {HABIT_OPTIONS.map((opt) => (
                                            <button key={opt.id} onClick={() => setSelectedHabits(prev => prev.includes(opt.id) ? prev.filter(h => h !== opt.id) : [...prev, opt.id])} className={`w-full flex items-center justify-between p-4 rounded-2xl border-2 transition-all text-left ${selectedHabits.includes(opt.id) ? 'border-indigo-600 bg-indigo-50 shadow-md' : 'border-slate-50 bg-white'}`}>
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${selectedHabits.includes(opt.id) ? 'text-indigo-600' : 'text-slate-300'}`}>{opt.icon}</div>
                                                    <span className={`text-[13px] font-semibold ${selectedHabits.includes(opt.id) ? 'text-indigo-950' : 'text-slate-600'}`}>{opt.label}</span>
                                                </div>
                                                {selectedHabits.includes(opt.id) && <Check className="w-5 h-5 text-indigo-600" />}
                                            </button>
                                        ))}
                                    </div>
                                    <button disabled={selectedHabits.length === 0} onClick={() => setStep(4)} className="w-full bg-indigo-900 text-white py-4 rounded-3xl font-bold shadow-xl disabled:opacity-30 transition-all">確認並繼續</button>
                                </div>
                            )}

                            {step === 4 && (
                                <div className="animate-in space-y-6">
                                    <div>
                                        <div className="flex items-center gap-2 mb-4 font-bold text-indigo-950"><span className="w-1 h-5 bg-amber-500 rounded-full"></span> 目前孩子的視力變化狀況</div>
                                        <div className="grid gap-2">
                                            {VISION_CHANGE_OPTIONS.map((opt) => (
                                                <button key={opt.id} onClick={() => setVisionStatus(opt.id)} className={`flex items-center gap-4 p-4 rounded-2xl border-2 transition-all text-left ${visionStatus === opt.id ? 'border-indigo-600 bg-indigo-50 shadow-md' : 'border-slate-50 bg-white'}`}>
                                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center ${visionStatus === opt.id ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{opt.icon}</div>
                                                    <div><div className="text-[13px] font-bold text-indigo-950">{opt.label}</div><div className="text-[10px] text-slate-400 leading-tight mt-0.5">{opt.sub}</div></div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div>
                                        <div className="flex items-center gap-2 mb-4 font-bold text-indigo-950"><span className="w-1 h-5 bg-indigo-900 rounded-full"></span> 感興趣控制方式 (可複選)</div>
                                        <div className="grid grid-cols-2 gap-2 mb-2">
                                            {INTEREST_ROW_1.map((opt) => (
                                                <button key={opt.id} onClick={() => toggleInterest(opt.id)} className={`flex items-center gap-2.5 p-3 rounded-xl border-2 transition-all text-left min-h-[56px] ${selectedInterests.includes(opt.id) ? 'border-indigo-900 bg-indigo-50 shadow-sm text-indigo-950' : 'border-slate-50 bg-white text-slate-500'}`}>
                                                    <div className={selectedInterests.includes(opt.id) ? 'text-indigo-900' : 'text-slate-300'}>{opt.icon}</div>
                                                    <span className="text-[11px] font-bold leading-tight">{opt.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                        <div className="grid grid-cols-3 gap-2">
                                            {INTEREST_ROW_2.map((opt) => (
                                                <button key={opt.id} onClick={() => toggleInterest(opt.id)} className={`flex flex-col items-center justify-center p-2 rounded-xl border-2 transition-all text-center min-h-[64px] ${selectedInterests.includes(opt.id) ? 'border-indigo-900 bg-indigo-50 shadow-sm text-indigo-950' : 'border-slate-50 bg-white text-slate-500'}`}>
                                                    <div className={`mb-1 ${selectedInterests.includes(opt.id) ? 'text-indigo-900' : 'text-slate-300'}`}>{opt.icon}</div>
                                                    <span className="text-[9px] font-bold leading-tight">{opt.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <button disabled={!visionStatus || selectedInterests.length === 0} onClick={handleCalculateAnalysis} className="w-full bg-indigo-900 text-white py-4 rounded-3xl font-bold shadow-xl disabled:opacity-30 transition-all">查看專業分析報告</button>
                                </div>
                            )}

                            {step === 100 && result && (
                                <div className="animate-in text-center">
                                    <div className={`p-6 rounded-[2.5rem] border-2 mb-6 ${result.riskLevel === 'RED' ? 'bg-rose-50 border-rose-100 text-rose-700' : (result.riskLevel === 'YELLOW' ? 'bg-amber-50 border-amber-100 text-amber-700' : 'bg-emerald-50 border-emerald-100 text-emerald-700')}`}>
                                        <div className="text-2xl mb-1">{result.riskLevel === 'RED' ? '🔴' : (result.riskLevel === 'YELLOW' ? '🟡' : '🟢')}</div>
                                        <h2 className="text-2xl font-black tracking-tight">目前近視控制風險{result.riskLevel === 'RED' ? '偏高' : (result.riskLevel === 'YELLOW' ? '中等' : '穩定')}</h2>
                                        <p className="text-sm font-bold opacity-80 mt-1">— {result.riskLevel === 'RED' ? '建議儘早專業評估' : (result.riskLevel === 'YELLOW' ? '建議安排檢查觀察' : '建議定期追蹤檢查')}</p>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-[2rem] border border-slate-100 text-left mb-8 shadow-sm">
                                        <div className="flex gap-2 mb-3 text-indigo-900 font-bold items-center text-xs tracking-wider"><Activity className="w-4 h-4 text-amber-500" /> 臨床專家關鍵洞察</div>
                                        <p className="text-slate-600 text-[13px] leading-relaxed italic mb-4">「根據評估，孩子目前的風險主要來自於<span className="text-indigo-950 font-bold">{result.reasonText}</span>，這可能影響長期穩定度。」</p>
                                        {result.cognitiveType === 'LOW_AWARENESS' && <div className="flex gap-3 bg-amber-100/50 p-3 rounded-xl border border-amber-200"><ShieldAlert className="w-4 h-4 text-amber-600 mt-0.5 shrink-0" /><p className="text-[10px] text-amber-900 font-bold leading-relaxed">提示：家長傾向預防，但數據顯示習慣已屬高風險，建議及早評估避免度數爆發。</p></div>}
                                        {result.cognitiveType === 'OVERLY_ANXIOUS' && <div className="flex gap-3 bg-emerald-100/50 p-3 rounded-xl border border-emerald-200"><Heart className="w-4 h-4 text-emerald-600 mt-0.5 shrink-0" /><p className="text-[10px] text-emerald-900 font-bold leading-relaxed">提示：目前數據顯示風險尚在安全區，家長不必過度擔憂，持續良好習慣即可。</p></div>}
                                    </div>
                                    <button onClick={saveResult} disabled={isSubmitting} className="w-full bg-indigo-900 text-white py-5 rounded-3xl font-bold shadow-xl uppercase tracking-widest text-sm transition-all">{isSubmitting ? "正在儲存中..." : "儲存分析結果並預約"}</button>
                                </div>
                            )}

                            {step === 101 && (
                                <div className="text-center py-12 animate-in">
                                    <div className="w-24 h-24 bg-emerald-50 rounded-[2.5rem] flex items-center justify-center mx-auto mb-8 border border-emerald-100 shadow-lg"><CheckCircle2 className="w-12 h-12 text-emerald-500" /></div>
                                    <h2 className="text-2xl font-bold mb-4 text-indigo-950">分析檔案已儲存</h2>
                                    <p className="text-slate-400 mb-10 px-6 leading-relaxed text-sm font-medium">您的資料已安全傳送至店內，驗光師將針對您的情況為您準備深度諮詢方案。</p>
                                    <button onClick={() => window.close()} className="w-full border-2 border-indigo-900 text-indigo-900 py-4 rounded-3xl font-bold hover:bg-indigo-50 transition-all text-sm uppercase tracking-widest">返回預約系統</button>
                                </div>
                            )}
                        </div>
                        <div className="p-5 bg-slate-50 border-t border-slate-100 text-center">
                            <p className="text-[9px] text-slate-400 uppercase tracking-[5px] font-bold">Precision Optical SaaS v5.2</p>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
